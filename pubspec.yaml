name: product_catalog_application
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  cached_network_image: ^3.4.1
  flutter:
    sdk: flutter
  flutter_svg: ^2.3.0
  get: ^4.7.3
  http: ^1.6.0
  intl: ^0.20.2
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

assets:
  - assets/image/
  - assets/icons/

fonts:
  - family: FKGroteskNeueTrial
    fonts:
      - asset: assets/font/FKGroteskNeueTrial-Black.otf
        weight: 400
      - asset: assets/font/FKGroteskNeueTrial-Medium.otf
        weight: 500
      - asset: assets/font/FKGroteskNeueTrial-Bold.otf
        weight: 700
      - asset: assets/font/FKGroteskNeueTrial-Black.otf
        weight: 900
